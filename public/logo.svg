<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 100">
  <rect width="110" height="100" rx="15" fill="#1d4ed8"/>
  <!-- V: two triangles meeting at a point -->
  <polygon points="6,15 18,15 32,85" fill="white"/>
  <polygon points="58,15 46,15 32,85" fill="white"/>
  <!-- K: vertical stem + two triangular arms -->
  <rect x="64" y="15" width="11" height="70" fill="white"/>
  <polygon points="75,15 75,52 104,15" fill="white"/>
  <polygon points="75,52 75,85 104,85" fill="white"/>
</svg>
